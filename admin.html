<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login - My Blog</title>
  <link rel="stylesheet" href="blog.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="brand"><a href="/blog.html" class="brand-link">Cipher</a></div>
    </nav>
  </header>

  <main>
    <div class="blog-container">
      <!-- Login Form -->
      <div id="login-section">
        <h1>Admin Login Required</h1>
        <p class="muted">Please enter your admin password to access the management panel.</p>
        <form id="login-form">
          <label>Admin Password<br><input type="password" id="admin-password" required placeholder="Enter admin password"></label>
          <div style="margin-top:.5rem">
            <button type="submit">Login</button>
          </div>
        </form>
        <p id="login-status" class="muted"></p>
      </div>

      <!-- Admin Panel (hidden until login) -->
      <div id="admin-panel" style="display:none;">
        <h1>Admin — Publish & Manage Posts</h1>
        <div class="new-post">
          <form id="admin-post-form">
            <input type="hidden" id="editing-id" value="">
            <label>Title<br><input type="text" id="post-title" required></label>
            <label>Excerpt<br><input type="text" id="post-excerpt"></label>
            <label>Body<br><textarea id="post-body" rows="8" required></textarea></label>
            <div style="margin-top:.5rem">
              <button type="submit" id="publish-btn">Publish</button>
              <button type="button" id="cancel-edit" style="display:none">Cancel</button>
            </div>
          </form>
          <p id="status" class="muted"></p>
        </div>

        <section class="admin-posts">
          <h2>Existing posts</h2>
          <div id="admin-posts-list" class="posts-list muted">Loading…</div>
        </section>
        <section class="admin-archive">
          <h2>Archived posts</h2>
          <div id="admin-archive-list" class="posts-list muted">Loading…</div>
        </section>

        <section class="admin-logs">
          <h2>Activity logs</h2>
          <div id="admin-logs-list" class="posts-list muted">Loading…</div>
        </section>

        <div style="margin-top:2rem; padding:1rem; background:#f0f0f0; border-radius:6px;">
          <button id="logout-btn" style="background:#dc2626; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer;">Logout</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function(){
      const loginSection = document.getElementById('login-section');
      const adminPanel = document.getElementById('admin-panel');
      const loginForm = document.getElementById('login-form');
      const loginStatus = document.getElementById('login-status');
      const logoutBtn = document.getElementById('logout-btn');

      let authToken = localStorage.getItem('adminToken');

      function showLogin(){
        loginSection.style.display = 'block';
        adminPanel.style.display = 'none';
      }

      function showAdmin(){
        loginSection.style.display = 'none';
        adminPanel.style.display = 'block';
        loadPosts();
        loadArchive();
        loadLogs();
      }

      function setLoginStatus(msg, err){
        loginStatus.textContent = msg;
        loginStatus.style.color = err ? '#f88' : '#cfc';
      }

      // Check if already logged in
      if (authToken) {
        showAdmin();
      } else {
        showLogin();
      }

      // Login form handler
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('admin-password').value;

        if (!password) {
          setLoginStatus('Password required', true);
          return;
        }

        setLoginStatus('Logging in...');

        try {
          const res = await fetch('/api/admin/test-auth', {
            headers: {'Authorization': 'Bearer ' + password}
          });

          if (res.ok) {
            authToken = password;
            localStorage.setItem('adminToken', authToken);
            setLoginStatus('Login successful!', false);
            setTimeout(() => showAdmin(), 1000);
          } else {
            setLoginStatus('Invalid password', true);
          }
        } catch (e) {
          setLoginStatus('Network error', true);
        }
      });

      // Logout handler
      logoutBtn.addEventListener('click', () => {
        authToken = null;
        localStorage.removeItem('adminToken');
        showLogin();
        loginForm.reset();
        setLoginStatus('');
      });

      // Admin functionality
      const form = document.getElementById('admin-post-form');
      const status = document.getElementById('status');
      const postsList = document.getElementById('admin-posts-list');
      const publishBtn = document.getElementById('publish-btn');
      const cancelBtn = document.getElementById('cancel-edit');
      const editingIdInput = document.getElementById('editing-id');

      function setStatus(msg, err){
        status.textContent = msg;
        status.style.color = err ? '#f88' : '#cfc';
      }

      async function loadPosts(){
        if (!authToken) return;
        try{
          const res = await fetch('/api/posts');
          const posts = await res.json();
          if (!posts.length) return postsList.innerHTML = '<p>No posts yet.</p>';
          postsList.innerHTML = posts.map(p => {
            return `<div class="admin-post-item" data-id="${p.id}">
              <strong>${p.title}</strong> <small>${new Date(p.date).toLocaleString()}</small>
              <div class="admin-actions">
                <button class="edit-post">Edit</button>
                <button class="delete-post">Delete</button>
              </div>
            </div>`;
          }).join('\n');

          postsList.querySelectorAll('.edit-post').forEach(btn => {
            btn.addEventListener('click', (e) => {
              const id = btn.closest('.admin-post-item').dataset.id;
              const post = posts.find(p => String(p.id) === String(id));
              if (!post) return;
              document.getElementById('post-title').value = post.title || '';
              document.getElementById('post-excerpt').value = post.excerpt || '';
              document.getElementById('post-body').value = post.body || '';
              editingIdInput.value = post.id;
              publishBtn.textContent = 'Save';
              cancelBtn.style.display = 'inline-block';
            });
          });

          postsList.querySelectorAll('.delete-post').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              const id = btn.closest('.admin-post-item').dataset.id;
              if (!confirm('Delete this post?')) return;
              try{
                const res = await fetch('/api/posts/'+id, {
                  method:'DELETE',
                  headers:{
                    'Content-Type':'application/json',
                    'Authorization': 'Bearer ' + authToken
                  }
                });
                if (!res.ok){
                  const err = await res.json().catch(()=>({}));
                  alert('Delete failed: '+(err.error||res.status));
                  return;
                }
                setStatus('Deleted', false);
                await loadPosts();
                await loadArchive();
              }catch(e){ alert('Network error deleting'); }
            });
          });
        }catch(e){ postsList.innerHTML = '<p class="muted">Could not load posts.</p>'; }
      }

      async function loadArchive(){
        if (!authToken) return;
        try{
          const res = await fetch('/api/archive', {
            headers: {'Authorization': 'Bearer ' + authToken}
          });
          if (!res.ok) return document.getElementById('admin-archive-list').innerHTML = '<p class="muted">No archive or unauthorized</p>';
          const archived = await res.json();
          const el = document.getElementById('admin-archive-list');
          if (!archived.length) return el.innerHTML = '<p>No archived posts</p>';
          el.innerHTML = archived.map(p => `<div class="admin-post-item" data-id="${p.id}"><strong>${p.title}</strong> <small>${new Date(p.date).toLocaleString()}</small><div class="admin-actions"><button class="restore-post">Restore</button></div></div>`).join('\n');
          el.querySelectorAll('.restore-post').forEach(btn => {
            btn.addEventListener('click', async () => {
              const id = btn.closest('.admin-post-item').dataset.id;
              if (!confirm('Restore this archived post?')) return;
              try{
                const res = await fetch('/api/archive/'+id+'/restore', {
                  method:'POST',
                  headers:{
                    'Content-Type':'application/json',
                    'Authorization': 'Bearer ' + authToken
                  }
                });
                if (!res.ok){
                  const err = await res.json().catch(()=>({}));
                  alert('Restore failed: '+(err.error||res.status));
                  return;
                }
                setStatus('Restored', false);
                await loadPosts();
                await loadArchive();
              }catch(e){ alert('Network error restoring'); }
            });
          });
        }catch(e){ document.getElementById('admin-archive-list').innerHTML = '<p class="muted">Could not load archive</p>'; }
      }

      async function loadLogs(){
        if (!authToken) return;
        try{
          const res = await fetch('/api/admin/logs', {
            headers: {'Authorization': 'Bearer ' + authToken}
          });
          if (!res.ok) return document.getElementById('admin-logs-list').innerHTML = '<p class="muted">No logs or unauthorized</p>';
          const logs = await res.json();
          const el = document.getElementById('admin-logs-list');
          if (!logs.length) return el.innerHTML = '<p>No activity yet</p>';
          el.innerHTML = logs.map(l => `<div class="admin-log-item"><small>${l.time}</small> <strong>${l.action}</strong> ${l.title?(' - '+l.title):''} ${l.id?('(id:'+l.id+')'):''}</div>`).join('\n');
        }catch(e){ document.getElementById('admin-logs-list').innerHTML = '<p class="muted">Could not load logs</p>'; }
      }

      // Form handlers
      cancelBtn.addEventListener('click', ()=>{
        form.reset();
        editingIdInput.value='';
        publishBtn.textContent='Publish';
        cancelBtn.style.display='none';
        setStatus('Edit cancelled');
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!authToken) {
          setStatus('Not authenticated', true);
          return;
        }

        setStatus('Processing...');
        const title = document.getElementById('post-title').value.trim();
        const excerpt = document.getElementById('post-excerpt').value.trim();
        const body = document.getElementById('post-body').value.trim();
        const editingId = editingIdInput.value;

        if (!title || !body) {
          setStatus('Title and body required', true);
          return;
        }

        try{
          let res;
          if (editingId){
            res = await fetch('/api/posts/'+editingId, {
              method:'PUT',
              headers:{
                'Content-Type':'application/json',
                'Authorization': 'Bearer ' + authToken
              },
              body: JSON.stringify({title, excerpt, body})
            });
            if (!res.ok){
              const err = await res.json().catch(()=>({}));
              setStatus('Save failed: '+(err.error||res.status), true);
              return;
            }
            setStatus('Saved', false);
            form.reset();
            editingIdInput.value='';
            publishBtn.textContent='Publish';
            cancelBtn.style.display='none';
          } else {
            res = await fetch('/api/posts', {
              method:'POST',
              headers:{
                'Content-Type':'application/json',
                'Authorization': 'Bearer ' + authToken
              },
              body: JSON.stringify({title, excerpt, body})
            });
            if (!res.ok){
              const err = await res.json().catch(()=>({}));
              setStatus('Publish failed: '+(err.error||res.status), true);
              return;
            }
            setStatus('Published', false);
            form.reset();
          }
          await loadPosts();
          await loadArchive();
          await loadLogs();
        }catch(e){ setStatus('Network error', true); }
      });
    })();
  </script>
</body>
</html>
